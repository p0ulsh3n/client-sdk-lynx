name: Native Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'

jobs:
  android-compile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6       # v6 = Node 24 runtime

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v6     # v6 = Node 24 runtime
        with:
          node-version: 24
          cache: 'yarn'
          cache-dependency-path: '**/yarn.lock'

      - uses: actions/cache@v5          # v5 = Node 24 runtime
        with:
          path: |
            ~/.npm
            ~/.config/yarn/global
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install root dependencies
        run: yarn install

      - name: Install CI dependencies
        run: cd ci && yarn

      - name: Compile Android (Debug)
        working-directory: ./ci/android/
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

  ios-compile:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
          cache-dependency-path: '**/yarn.lock'

      - uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            ~/.config/yarn/global
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache gem bundle
        uses: actions/cache@v5
        with:
          path: ./ci/vendor
          key: ${{ runner.os }}-gembundle-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gembundle-

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: ./ci/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Yarn
        run: |
          npm install -g yarn
          yarn

      - name: Install CI dependencies
        run: |
          yarn install
          cd ci/
          yarn

      - name: Pod install
        run: |
          cd ci/ios/
          bundle install
          bundle exec pod install --repo-update

      - name: Compile iOS
        working-directory: ./ci/ios/
        run: |
          xcodebuild -workspace ci.xcworkspace/ \
            -scheme ci \
            -destination generic/platform=iOS \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED="NO" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            clean build 2>&1 | tail -200

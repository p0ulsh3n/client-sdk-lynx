name: TypeScript

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No cache here — yarn.lock is a stub, will install fresh

      - name: Install dependencies
        run: yarn install --no-frozen-lockfile 2>/dev/null || yarn install

      - name: Run TypeScript typecheck
        run: yarn typecheck

      - name: Check no stale package imports
        run: |
          BROKEN=$(grep -rn "from '@livekit/lynx-webrtc'" src/ 2>/dev/null || true)
          if [ -n "$BROKEN" ]; then
            echo "❌ Stale @livekit/lynx-webrtc imports found:"
            echo "$BROKEN"
            exit 1
          fi
          echo "✅ No stale package imports"

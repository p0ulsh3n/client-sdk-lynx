name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  # ── TypeScript ──────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No cache — yarn.lock is a stub

      - name: Install
        run: yarn install

      - name: Typecheck
        run: yarn typecheck

      - name: No stale imports
        run: |
          BROKEN=$(grep -rn "from '@livekit/lynx-webrtc'" src/ 2>/dev/null || true)
          [ -z "$BROKEN" ] && echo "✅ Clean" || (echo "❌ $BROKEN"; exit 1)

  # ── Android ─────────────────────────────────────────────────────────────────
  android:
    name: Android (Kotlin 2.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Create host project
        run: |
          mkdir -p /tmp/T/app/src/main /tmp/T/gradle/wrapper

          printf 'include ":app", ":sdk"\nproject(":sdk").projectDir = new File("%s/android")\n' \
            "${{ github.workspace }}" > /tmp/T/settings.gradle

          cat > /tmp/T/build.gradle << 'EOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies {
              classpath 'com.android.tools.build:gradle:8.3.0'
              classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.0'
            }
          }
          allprojects {
            repositories { google(); mavenCentral(); maven { url 'https://jitpack.io' } }
          }
          EOF

          cat > /tmp/T/app/build.gradle << 'EOF'
          plugins { id 'com.android.application'; id 'kotlin-android' }
          android {
            namespace 'com.livekit.lynx.test'
            compileSdk 35
            defaultConfig { applicationId 'com.livekit.lynx.test'; minSdk 24; targetSdk 35 }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions { jvmTarget = '17' }
          }
          dependencies { implementation project(':sdk') }
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"/>' \
            > /tmp/T/app/src/main/AndroidManifest.xml

          cat > /tmp/T/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Compile Kotlin
        working-directory: /tmp/T
        run: |
          gradle :sdk:compileDebugKotlin --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" 2>&1 | tee out.log
          if grep -qE "^e:.*\.kt:|BUILD FAILED" out.log; then
            grep -E "^e:.*\.kt:" out.log | head -20 || tail -20 out.log
            exit 1
          fi
          echo "✅ Android OK"

  # ── iOS ─────────────────────────────────────────────────────────────────────
  ios:
    name: iOS (Swift 6)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - run: gem install cocoapods --no-document

      - name: Lint podspec
        run: |
          pod spec lint livekit-lynx.podspec --allow-warnings --skip-tests 2>&1 | tee lint.log || true
          # Fail only on dependency/syntax errors, not URL reachability
          ERR=$(grep -E "^\s+- ERROR \|" lint.log | grep -v "url:" || true)
          [ -z "$ERR" ] && echo "✅ podspec OK" || (echo "❌ $ERR"; exit 1)

      - name: Create host project
        run: |
          mkdir -p /tmp/T/T.xcodeproj
          cat > /tmp/T/T.xcodeproj/project.pbxproj << 'PBXPROJ'
          // !$*UTF8*$!
          { archiveVersion = 1; classes = {}; objectVersion = 56;
            objects = {
              PROJ = { isa = PBXProject; attributes = {LastUpgradeCheck = 1540;};
                buildConfigurationList = BCL; compatibilityVersion = "Xcode 14.0";
                mainGroup = GRP; targets = (TGT); };
              GRP = { isa = PBXGroup; children = (); sourceTree = "<group>"; };
              TGT = { isa = PBXNativeTarget; name = T; productName = T;
                buildPhases = (); buildRules = (); dependencies = ();
                buildConfigurationList = BCL2;
                productType = "com.apple.product-type.application"; };
              BCL  = { isa = XCConfigurationList; buildConfigurations = (CFG);
                defaultConfigurationIsVisible = 0; defaultConfigurationName = Debug; };
              BCL2 = { isa = XCConfigurationList; buildConfigurations = (CFG);
                defaultConfigurationIsVisible = 0; defaultConfigurationName = Debug; };
              CFG  = { isa = XCBuildConfiguration; name = Debug;
                buildSettings = { IPHONEOS_DEPLOYMENT_TARGET = 14.0; SDKROOT = iphoneos;
                  SWIFT_VERSION = 6.0; PRODUCT_NAME = T; }; };
            };
            rootObject = PROJ; }
          PBXPROJ

          cat > /tmp/T/Podfile << PODFILE
          platform :ios, '14.0'
          use_frameworks!
          target 'T' do
            pod 'livekit-lynx', :path => '${{ github.workspace }}'
          end
          PODFILE

      - name: pod install
        working-directory: /tmp/T
        run: pod install --repo-update 2>&1 | tail -10 && echo "✅ pod install OK"

      - name: xcodebuild
        working-directory: /tmp/T
        run: |
          xcodebuild build \
            -workspace T.xcworkspace \
            -scheme livekit-lynx \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee build.log
          grep -q "BUILD SUCCEEDED" build.log && echo "✅ iOS OK" || \
            (grep " error:" build.log | grep -v "^note:" | head -30; exit 1)

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ios-logs
          path: /tmp/T/build.log
          retention-days: 5

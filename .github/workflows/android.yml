name: Android Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  build-android:
    name: Compile Android (Kotlin 2.0)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Use official Gradle action — handles the wrapper jar correctly
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      # Create minimal host project to compile the SDK library module
      - name: Create host project
        run: |
          mkdir -p /tmp/AndroidTest/app/src/main
          mkdir -p /tmp/AndroidTest/gradle/wrapper

          # settings.gradle — includes our SDK as a local module
          cat > /tmp/AndroidTest/settings.gradle << 'SETTINGS'
          include ':app', ':sdk'
          project(':sdk').projectDir = new File('${{ github.workspace }}/android')
          SETTINGS

          # Root build.gradle
          cat > /tmp/AndroidTest/build.gradle << 'BUILD'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies {
              classpath 'com.android.tools.build:gradle:8.3.0'
              classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.0'
            }
          }
          allprojects {
            repositories {
              google()
              mavenCentral()
              maven { url 'https://jitpack.io' }
            }
          }
          BUILD

          # Minimal app that depends on our SDK (forces it to compile)
          cat > /tmp/AndroidTest/app/build.gradle << 'APP'
          plugins {
            id 'com.android.application'
            id 'kotlin-android'
          }
          android {
            namespace 'com.livekit.lynx.test'
            compileSdk 35
            defaultConfig {
              applicationId 'com.livekit.lynx.test'
              minSdk 24
              targetSdk 35
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
            implementation project(':sdk')
          }
          APP

          # Minimal manifest for the test app
          cat > /tmp/AndroidTest/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" />
          MANIFEST

          # Gradle wrapper properties — points to the correct distribution
          cat > /tmp/AndroidTest/gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS

      - name: Compile SDK Kotlin sources
        working-directory: /tmp/AndroidTest
        run: |
          # Use the 'gradle' command installed by gradle/actions/setup-gradle
          gradle :sdk:compileDebugKotlin \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            2>&1 | tee compile.log

          # Fail on actual Kotlin errors (e: prefix)
          if grep -qE "^e:.*\.kt:" compile.log; then
            echo "❌ Kotlin compilation errors:"
            grep -E "^e:.*\.kt:" compile.log
            exit 1
          fi

          if grep -q "BUILD FAILED" compile.log; then
            echo "❌ Build failed:"
            tail -30 compile.log
            exit 1
          fi

          echo "✅ Kotlin compilation succeeded"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-compile-log
          path: /tmp/AndroidTest/compile.log
          retention-days: 5

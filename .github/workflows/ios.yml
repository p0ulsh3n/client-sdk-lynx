name: iOS Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'ios/**'
      - 'livekit-lynx.podspec'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - 'livekit-lynx.podspec'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  build-ios:
    name: Compile iOS (Swift 6 + ObjC)
    runs-on: macos-14  # Apple Silicon, Xcode 15, free for public repos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      # Step 1: Validate the podspec (catches dependency errors and syntax issues)
      - name: Validate podspec
        run: |
          pod spec lint livekit-lynx.podspec \
            --allow-warnings \
            --skip-tests \
            --no-clean \
            2>&1 | tee podspec_lint.log || true

          # Only fail on real ERRORs, not warnings or URL-reachability
          if grep -E "^\s*- ERROR \|" podspec_lint.log | grep -v "url:"; then
            echo "❌ podspec has errors:"
            grep -E "^\s*- ERROR \|" podspec_lint.log | grep -v "url:"
            exit 1
          fi
          echo "✅ podspec valid (warnings ignored)"

      # Step 2: Create a minimal host Xcode project + Podfile that pulls in our SDK
      - name: Create minimal host project
        run: |
          mkdir -p /tmp/LKTest/LKTest.xcodeproj

          # Minimal valid Xcode project (no source files — we just need CocoaPods to run)
          cat > /tmp/LKTest/LKTest.xcodeproj/project.pbxproj << 'PBXPROJ'
          // !$*UTF8*$!
          {
            archiveVersion = 1; classes = {}; objectVersion = 56;
            objects = {
              PROJ = { isa = PBXProject; attributes = {LastUpgradeCheck = 1540;};
                buildConfigurationList = BCL; compatibilityVersion = "Xcode 14.0";
                mainGroup = GRP; targets = (TGT); };
              GRP  = { isa = PBXGroup; children = (); sourceTree = "<group>"; };
              TGT  = { isa = PBXNativeTarget; name = LKTest; productName = LKTest;
                buildPhases = (); buildRules = (); dependencies = ();
                buildConfigurationList = BCL2;
                productType = "com.apple.product-type.application"; };
              BCL  = { isa = XCConfigurationList; buildConfigurations = (CFG);
                defaultConfigurationIsVisible = 0; defaultConfigurationName = Debug; };
              BCL2 = { isa = XCConfigurationList; buildConfigurations = (CFG);
                defaultConfigurationIsVisible = 0; defaultConfigurationName = Debug; };
              CFG  = { isa = XCBuildConfiguration; name = Debug;
                buildSettings = {
                  IPHONEOS_DEPLOYMENT_TARGET = 14.0;
                  SDKROOT = iphoneos;
                  SWIFT_VERSION = 6.0;
                  PRODUCT_NAME = LKTest; }; };
            };
            rootObject = PROJ;
          }
          PBXPROJ

          # Podfile pointing to our local SDK
          cat > /tmp/LKTest/Podfile << PODFILE
          platform :ios, '14.0'
          use_frameworks!

          target 'LKTest' do
            pod 'livekit-lynx', :path => '${{ github.workspace }}'
          end
          PODFILE

      # Step 3: pod install — this resolves dependencies and sets up the workspace
      - name: pod install
        working-directory: /tmp/LKTest
        run: |
          pod install --repo-update 2>&1 | tee pod_install.log
          if grep -qE "^\[!\]|^Error:" pod_install.log | grep -v "URL"; then
            echo "❌ pod install failed"
            cat pod_install.log
            exit 1
          fi
          echo "✅ pod install done"
          ls -la

      # Step 4: Build the SDK pod target — this compiles ALL Swift and ObjC files
      - name: xcodebuild (compile SDK sources)
        working-directory: /tmp/LKTest
        run: |
          xcodebuild build \
            -workspace LKTest.xcworkspace \
            -scheme livekit-lynx \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            OTHER_SWIFT_FLAGS="-strict-concurrency=complete" \
            2>&1 | tee build.log

          # Report result
          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "✅ iOS build succeeded"
          else
            # Show all errors
            grep -E " error:" build.log | grep -v "^note:" | head -40 || true
            echo "❌ iOS build failed"
            exit 1
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: |
            /tmp/LKTest/pod_install.log
            /tmp/LKTest/build.log
          retention-days: 5
